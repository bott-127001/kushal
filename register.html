<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register - Kaivalya Astrology</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="logo.png" alt="Kaivalya Logo" class="logo" />
                Kaivalya Astrology
            </a>
            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
            >
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto" id="navLinks">
                    <!-- Auth links will be dynamically inserted here -->
                </ul>
            </div>
        </div>
    </nav>

    <!-- Register Form -->
    <section class="container my-5" style="max-width: 400px;">
        <h2 class="mb-4 text-center">Create a New Account</h2>
        <form id="registerForm" novalidate>
            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input
                    type="text"
                    class="form-control"
                    id="name"
                    placeholder="Enter your full name"
                    required
                />
                <div class="invalid-feedback">Please enter your full name.</div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input
                    type="email"
                    class="form-control"
                    id="email"
                    placeholder="Enter your email"
                    required
                />
                <div class="invalid-feedback">Please enter a valid email address.</div>
            </div>
            <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <input
                    type="text"
                    class="form-control"
                    id="address"
                    placeholder="Enter your address"
                    required
                />
                <div class="invalid-feedback">Please enter your address.</div>
            </div>
            <div class="mb-3">
                <label for="contactNo" class="form-label">Contact Number</label>
                <input
                    type="tel"
                    class="form-control"
                    id="contactNo"
                    placeholder="Enter your contact number"
                    required
                />
                <div class="invalid-feedback">Please enter your contact number.</div>
            </div>

            <!-- OTP Request Button -->
            <div class="mb-3 d-flex justify-content-between align-items-center">
                <button type="button" id="requestOtpBtnRegister" class="btn btn-secondary">Request OTP</button>
                <span id="otpRequestMessageRegister" class="text-success"></span>
            </div>

            <!-- OTP Input -->
            <div class="mb-3" id="otpInputGroupRegister" style="display:none;">
                <label for="otpRegister" class="form-label">Enter OTP</label>
                <input
                    type="text"
                    class="form-control"
                    id="otpRegister"
                    placeholder="Enter the OTP sent to your email"
                    maxlength="6"
                />
                <div class="invalid-feedback">Please enter the 6-digit OTP.</div>
            </div>

            <!-- Password Input (optional for fallback) -->
            <div class="mb-3" id="passwordGroupRegister">
                <label for="password" class="form-label">Password</label>
                <input
                    type="password"
                    class="form-control"
                    id="password"
                    placeholder="Enter your password"
                    minlength="6"
                />
                <div class="invalid-feedback">
                    Password must be at least 6 characters.
                </div>
            </div>

            <div id="registerMessage" class="mb-3 text-center"></div>
            <button type="submit" class="btn btn-primary w-100" id="registerSubmitBtn">Register</button>
        </form>
        <p class="mt-3 text-center">
            Already have an account?
            <a href="login.html">Login here</a>
        </p>
    </section>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
